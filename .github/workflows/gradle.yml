# Builds the desktop GeoMania Gradle project on Ubuntu and Windows (JDK 8, matches compile toolchain).
# Uses setup-gradle for dependency caching; dependency-submission enables Dependabot alerts for Gradle deps.
# See: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [main, master]
    paths:
      - "src/main/**"
      - "src/test/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/gradle.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "src/main/**"
      - "src/test/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/gradle.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build with Gradle Wrapper (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew build --no-daemon

      - name: Build with Gradle Wrapper (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat build --no-daemon

      - uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest'
        with:
          name: geomania-desktop-jar
          path: build/libs/GeoMania-*-all.jar
          if-no-files-found: error

  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v4
