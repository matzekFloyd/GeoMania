name: Web + desktop release

# Tag a commit (e.g. git tag v1.0.1 && git push origin v1.0.1) to attach a zip of web/dist and the desktop fat JAR to that GitHub Release.
# Note for release notes/users: extracted web bundle must be served via HTTP (not opened via file:// index.html).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Build desktop fat JAR
        run: chmod +x gradlew && ./gradlew shadowJar --no-daemon -PgeoVersion=${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: geomania-web-dist-${{ github.ref_name }}
          path: web/dist/
          if-no-files-found: error

      - name: Zip dist for GitHub Release
        run: (cd web && zip -rq "../geomania-web-${{ github.ref_name }}.zip" dist)

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            geomania-web-${{ github.ref_name }}.zip
            build/libs/GeoMania-${{ github.ref_name }}-all.jar
          generate_release_notes: true
